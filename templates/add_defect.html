{% extends "base.html" %}
{% block title %}Add Defect - {{ project.name }}{% endblock %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb mb-2">
        <li class="breadcrumb-item"><a href="{{ url_for('project_view', project_id=project.id) }}">{{ project.name }}</a></li>
        <li class="breadcrumb-item active">Add Defect</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">New Defect</h5>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="unit_number" class="form-label">Location</label>
                        <select class="form-select" id="unit_number" name="unit_number" required>
                            <option value="">Select location...</option>
                            {% for loc in locations %}
                            <option value="{{ loc }}">{{ loc }}</option>
                            {% endfor %}
                            <option value="__custom__">+ New location...</option>
                        </select>
                        <input type="text" class="form-control mt-2 d-none" id="custom_location" name="custom_location" placeholder="Enter new location name...">
                    </div>
                    <div class="mb-3">
                        <label for="trade" class="form-label">Trade</label>
                        <select class="form-select" id="trade" name="trade" required>
                            <option value="">Select trade...</option>
                            {% for t in trades %}
                            <option value="{{ t }}">{{ t }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" required placeholder="Describe the defect..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="photos" class="form-label">Photos</label>
                        <input type="file" class="form-control" id="photos" name="photos" multiple accept="image/*" capture="environment">
                        <div class="form-text">Take a photo or select from gallery. Multiple allowed.</div>
                    </div>
                    <div id="photo-preview" class="d-flex flex-wrap gap-2 mb-3"></div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-plus-lg"></i> Add Defect</button>
                        <a href="{{ url_for('project_view', project_id=project.id) }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('unit_number').addEventListener('change', function() {
    var custom = document.getElementById('custom_location');
    if (this.value === '__custom__') {
        custom.classList.remove('d-none');
        custom.required = true;
        custom.focus();
    } else {
        custom.classList.add('d-none');
        custom.required = false;
        custom.value = '';
    }
});

document.getElementById('photos').addEventListener('change', function(e) {
    var preview = document.getElementById('photo-preview');
    preview.innerHTML = '';
    for (var i = 0; i < e.target.files.length; i++) {
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'rounded';
            img.style.width = '80px';
            img.style.height = '80px';
            img.style.objectFit = 'cover';
            preview.appendChild(img);
        };
        reader.readAsDataURL(e.target.files[i]);
    }
});
</script>
{% endblock %}
