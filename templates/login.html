{% extends "base.html" %}
{% block title %}Login - Defect Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-tools"></i> Defect Tracker</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Log In</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
